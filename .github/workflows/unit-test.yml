name: Run Tests

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-openfhe:
    runs-on: ubuntu-latest
    outputs:
      hash: ${{ steps.openfhe.outputs.hash }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Use the openfhe submodule commit as the cache key so the cache is
      # invalidated automatically whenever the submodule is bumped.
      - name: Get OpenFHE submodule hash
        id: openfhe
        run: |
          echo "hash=$(git submodule status vendors/openfhe-development \
            | awk '{print $1}' | tr -d '+-')" >> "$GITHUB_OUTPUT"

      - name: Restore OpenFHE cache
        id: cache-openfhe
        uses: actions/cache/restore@v5
        with:
          path: vendors/install
          key: openfhe-${{ runner.os }}-${{ steps.openfhe.outputs.hash }}

      - name: Build and install OpenFHE
        if: steps.cache-openfhe.outputs.cache-hit != 'true'
        run: |
          cmake -S vendors/openfhe-development \
                -B vendors/openfhe-development/build \
                -DBUILD_STATIC=ON \
                -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/vendors/install"
          cmake --build vendors/openfhe-development/build -j$(nproc)
          cmake --install vendors/openfhe-development/build

      - name: Save OpenFHE cache
        if: steps.cache-openfhe.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: vendors/install
          key: openfhe-${{ runner.os }}-${{ steps.openfhe.outputs.hash }}

  test:
    runs-on: ubuntu-latest
    needs: build-openfhe

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Restore OpenFHE cache
        uses: actions/cache/restore@v5
        with:
          path: vendors/install
          key: openfhe-${{ runner.os }}-${{ needs.build-openfhe.outputs.hash }}

      - name: Configure project
        run: cmake -B build -DBUILD_STATIC=ON

      - name: Run tests
        run: cmake --build build --target check -j$(nproc)
